<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentaciones · TSC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared/css/base.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .landing { text-align: center; max-width: 700px; padding: 40px 24px; }
    .landing__logo {
      font-family: var(--font-display);
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .landing__sub { color: var(--text-muted); margin-bottom: 48px; font-size: 0.9rem; }
    .deck-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
      text-decoration: none;
      display: block;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
      text-align: left;
    }
    .deck-card:hover {
      border-color: rgba(96,165,250,0.4);
      transform: translateY(-4px);
      box-shadow: 0 24px 60px rgba(29,78,216,0.2);
    }
    .deck-card__tag {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(29,78,216,0.2);
      color: #60a5fa;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .deck-card__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .deck-card__desc { font-size: 0.9rem; color: var(--text-muted); margin: 0; }
    .deck-card__arrow {
      float: right;
      font-size: 1.2rem;
      color: #60a5fa;
      transition: transform 0.2s;
    }
    .deck-card:hover .deck-card__arrow { transform: translateX(4px); }
  </style>
</head>
<body>
  <div class="landing">
    <div class="landing__logo">TSC</div>
    <p class="landing__sub">Portal de presentaciones · Trabajos San Cosme</p>
    <a href="brands/tsc/" class="deck-card">
      <span class="deck-card__arrow">→</span>
      <div class="deck-card__tag">2025</div>
      <div class="deck-card__title">Dona tu Consulta · UC Christus</div>
      <p class="deck-card__desc">Propuesta de colaboración con la Red UC Christus para la campaña de recaudación en Clínica San Carlos de Apoquindo.</p>
    </a>
  </div>
</body>
</html>
